# ==============================================================================
# Build and Deploy recur-date-based-docs to Production Server
# ==============================================================================
# Runs on push to master. gh-pages: use `pnpm run deploy` manually.
#
# REQUIRED GITHUB SECRETS (Settings > Secrets and variables > Actions):
# - SSH_HOST: Server IP or domain
# - SSH_USER: SSH username
# - SSH_KEY: Private SSH key for authentication
# - APP_DIR: Deployment directory (e.g. /home/user/apps/recur-date-based-docs)
#
# OPTIONAL GITHUB SECRETS:
# - SSH_PORT: SSH port (default: 22)
#
# Web server should serve from: $APP_DIR/current
# ==============================================================================

name: Build and Deploy to Production Server

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: CI=false pnpm run build

      - name: Create build archive
        run: tar -czf build.tar.gz -C build .

      - name: Add server to SSH known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Copy build to server
        run: |
          scp -P "${{ secrets.SSH_PORT || 22 }}" build.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/build-${{ github.sha }}.tar.gz"

      - name: Deploy with versioning
        run: |
          ssh -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -e
            APP_DIR='${{ secrets.APP_DIR }}'
            RELEASES_DIR=\"\$APP_DIR/releases\"
            CURRENT_LINK=\"\$APP_DIR/current\"
            RELEASE_NAME='${{ github.sha }}'
            NEW_RELEASE=\"\$RELEASES_DIR/\$RELEASE_NAME\"
            TAR_FILE='/tmp/build-${{ github.sha }}.tar.gz'
            KEEP_RELEASES=5

            echo '🚀 Starting deployment:' \$RELEASE_NAME
            mkdir -p \"\$RELEASES_DIR\"
            mkdir -p \"\$NEW_RELEASE\"
            tar -xzf \"\$TAR_FILE\" -C \"\$NEW_RELEASE\"
            chmod -R 755 \"\$NEW_RELEASE\"
            ln -sfn \"\$NEW_RELEASE\" \"\$CURRENT_LINK\"
            cd \"\$RELEASES_DIR\"
            ls -t | tail -n +\$((KEEP_RELEASES + 1)) | xargs -r rm -rf
            rm \"\$TAR_FILE\"
            echo '✅ Deployment successful!'
          "
